<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Photography Portfolio</title>

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    /* Background image */
    body {
      height: 100vh;
      background: url("background.jpg") no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Container for cards */
    .container {
      display: grid;
      grid-template-columns: repeat(4, 200px);
      gap: 30px;
    }

    /* Glassmorphism card */
    .card {
      height: 150px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: black;
      font-size: 16px;
      transition: 0.3s;
    }

    /* Hover effect */
    .card:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.3);
    }

    /* Emoji icon */
    .icon {
      font-size: 30px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

  <div class="container">

    <a href="#" class="card">
      <div class="icon">🎨</div>
      Style
    </a>

    <a href="#" class="card">
      <div class="icon">📷</div>
      Poses
    </a>

    <a href="#" class="card">
      <div class="icon">🖼️</div>
      Filters
    </a>

  </div>

</body>
</html>
